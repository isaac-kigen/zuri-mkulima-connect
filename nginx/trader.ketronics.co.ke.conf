# ============================================================
# Nginx Configuration — trader.ketronics.co.ke
# Zuri Mkulima Connect — Next.js Reverse Proxy
# ============================================================

# ── Upstream to Next.js ──────────────────────────────────────
upstream nextjs_upstream {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS Redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name trader.ketronics.co.ke;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trader.ketronics.co.ke;

    # ── SSL (managed by Certbot / Let's Encrypt) ─────────────
    ssl_certificate     /etc/letsencrypt/live/trader.ketronics.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trader.ketronics.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # ── Root & Logs ──────────────────────────────────────────
    root /var/www/trader.ketronics.co.ke;
    access_log /var/log/nginx/trader.ketronics.co.ke.access.log;
    error_log  /var/log/nginx/trader.ketronics.co.ke.error.log;

    # ── Client body size (for image uploads) ────────────────
    client_max_body_size 10M;

    # ── Main Proxy to Next.js ────────────────────────────────
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;

        # ── Headers ──────────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # ── WebSocket support (Next.js HMR / live reload) ──
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # ── Timeouts ─────────────────────────────────────────
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # ── Buffering ────────────────────────────────────────
        proxy_buffering off;
        proxy_buffer_size 4k;
    }

    # ── M-Pesa Callback (ensure no buffering) ─────────────────
    location /api/payments/callback {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # ── Static assets (cached) ────────────────────────────────
    location /_next/static {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        proxy_cache_valid 200 1d;
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Health check ─────────────────────────────────────────
    location /api/health {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Deny hidden files ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
